name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      - uses: actions/setup-node@v6
        with:
          check-latest: true
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run typecheck
      - run: pnpm run test:packages
      - run: pnpm run test:examples
        env:
          CI: true
      - run: pnpm --filter @ddtds/core --filter ddtds --filter @ddtds/vitest publish --dry-run --no-git-checks
